name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@v2
        with:
          args: -g retail
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      # Packager embeds the entire CHANGELOG.md as the release body, which
      # pulls in previous version blocks too. Replace the body with just the
      # top version block so the GitHub release page and the Discord post
      # show only the current release.
      - name: Trim release notes to current version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk '
            /^## v/ {
              count++
              if (count == 2) exit
              next
            }
            count == 1 { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          echo '--- trimmed release notes ---'
          cat /tmp/release-notes.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/release-notes.md

      # Packager creates the GitHub release under the default token, which
      # means the `release: [published]` event is suppressed (GitHub's
      # recursion guard). Read the just-created release explicitly and feed
      # it to the Discord action as overrides.
      - name: Fetch release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          name=$(gh release view "$tag" --json name -q .name)
          url=$(gh release view "$tag" --json url -q .url)
          body=$(gh release view "$tag" --json body -q .body)
          {
            echo "name=$name"
            echo "url=$url"
            echo "body<<RELEASE_BODY_EOF"
            echo "$body"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post release to Discord
        uses: SethCohen/github-releases-to-discord@v1
        continue-on-error: true
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          release_name: ${{ steps.release.outputs.name }}
          release_html_url: ${{ steps.release.outputs.url }}
          release_body: ${{ steps.release.outputs.body }}
          reduce_headings: true
