name: Luacheck

on:
  pull_request:
  push:
    branches: [main, working, working-testing]

jobs:
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lua 5.1 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks

      - name: Install luacheck
        run: sudo luarocks --lua-version=5.1 install luacheck

      - name: Collect changed Lua files
        id: changed_lua
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          git diff --name-only "$base_sha" "$head_sha" -- '*.lua' ':!Libs/**' > changed_lua_files.txt

          if [ -s changed_lua_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run luacheck
        if: steps.changed_lua.outputs.has_files == 'true'
        run: luacheck $(cat changed_lua_files.txt) --config .luacheckrc

      - name: No Lua changes
        if: steps.changed_lua.outputs.has_files != 'true'
        run: echo "No changed Lua files to lint."
