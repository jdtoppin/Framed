name: Luacheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks

      - name: Install luacheck
        run: sudo luarocks --lua-version=5.1 install luacheck

      - name: Run luacheck
        run: luacheck . --config .luacheckrc
